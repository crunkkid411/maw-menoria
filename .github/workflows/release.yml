name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (test only, no publish)'
        required: false
        default: false
        type: boolean

jobs:
  # ============================================================
  # Validate Version
  # ============================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected X.Y.Z)"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Version format valid: $VERSION"

      - name: Check if version exists on npm
        run: |
          if npm view @memvid/maw@${{ inputs.version }} version 2>/dev/null; then
            echo "::error::Version ${{ inputs.version }} already exists on npm!"
            exit 1
          fi
          echo "✅ Version ${{ inputs.version }} is available"

  # ============================================================
  # Build & Test
  # ============================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Run tests
        run: pnpm test || echo "No tests yet"

      # --------------------------------------------------------
      # E2E Tests
      # --------------------------------------------------------
      - name: E2E - Crawl test
        run: |
          echo "=== E2E: Crawl memvid.com ==="
          node dist/bin/maw.js https://memvid.com -o e2e-test.mv2 --max-pages 5

          if [ ! -f "e2e-test.mv2" ]; then
            echo "::error::Crawl failed - no output file"
            exit 1
          fi

          ls -lh e2e-test.mv2
          echo "✅ Crawl successful"

      - name: E2E - List command
        run: |
          node dist/bin/maw.js list e2e-test.mv2
          echo "✅ List works"

      - name: E2E - Find command
        run: |
          node dist/bin/maw.js find e2e-test.mv2 "memory"
          echo "✅ Find works"

      - name: Cleanup
        run: rm -f e2e-test.mv2

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ============================================================
  # Publish to npm
  # ============================================================
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: inputs.dry_run == false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Update package.json
        run: |
          # Update package name to scoped
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = '@memvid/maw';
            pkg.version = '${{ inputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          echo "=== Updated package.json ==="
          cat package.json

      - name: Install dependencies
        run: pnpm install

      - name: Publish
        run: |
          npm publish --access public
          echo "✅ Published @memvid/maw@${{ inputs.version }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ============================================================
  # Dry Run
  # ============================================================
  dry-run:
    name: Dry Run
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: inputs.dry_run == true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Prepare package
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = '@memvid/maw';
            pkg.version = '${{ inputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Pack and inspect
        run: |
          npm pack

          TARBALL=$(ls -1 *.tgz | head -1)
          SIZE=$(ls -lh "$TARBALL" | awk '{print $5}')

          echo "=== Package: $TARBALL ==="
          echo "📦 Size: $SIZE"
          echo ""
          echo "=== Contents ==="
          tar -tzf "$TARBALL"

          echo ""
          echo "🧪 Dry run complete - no publish performed"

  # ============================================================
  # Create GitHub Release
  # ============================================================
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, publish]
    if: inputs.dry_run == false
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: |
            ## @memvid/maw v${{ inputs.version }}

            ### Install

            ```bash
            npm i -g @memvid/maw
            ```

            Or use directly:

            ```bash
            npx @memvid/maw https://memvid.com
            ```

            ### Changes

            See [README](https://github.com/memvid/maw#readme) for full documentation.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Summary
  # ============================================================
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [validate, build, publish]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## @memvid/maw Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Test | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish | ${{ needs.publish.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dry Run:** ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
